<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>校招雷达</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">JR</span>
      <div>
        <p>JOB RADAR</p>
        <h1>校招雷达</h1>
      </div>
    </div>
    <div class="top-status" aria-live="polite">
      <span id="modeStatus" class="status-chip">本地模式</span>
      <span id="registryStatus" class="status-chip">读取来源...</span>
      <span id="networkStatus" class="status-chip">检查联网...</span>
    </div>
  </header>

  <main id="workspace" class="workspace">
    <aside class="settings-pane" aria-label="搜索与筛选设置">
      <form id="searchForm" class="settings-section">
        <div class="section-heading">
          <h2>搜索条件</h2>
          <button id="resetFilters" type="button" class="text-button">清空</button>
        </div>

        <label class="field field-wide">
          <span>关键词</span>
          <input id="query" value="秋招" placeholder="秋招 / 公司 / 岗位 / 专业" autocomplete="off" />
        </label>

        <details id="advancedFilters" class="advanced-filters" open>
          <summary>更多筛选</summary>
          <div class="field-grid advanced-filter-content">
          <label class="field">
            <span>城市</span>
            <input id="city" placeholder="北京 / 上海" autocomplete="off" />
          </label>
          <label class="field">
            <span>届别</span>
            <input id="cohort" placeholder="2027" inputmode="numeric" />
          </label>
          <label class="field">
            <span>招聘批次</span>
            <select id="recruitmentType">
              <option value="">不限</option>
              <option value="提前批">提前批</option>
              <option value="秋招">秋招</option>
              <option value="校招">校园招聘</option>
              <option value="春招">春招</option>
              <option value="实习">实习</option>
              <option value="补录">补录</option>
              <option value="公开招聘">公开招聘</option>
            </select>
          </label>
          <label class="field">
            <span>企业类型</span>
            <select id="companyType">
              <option value="">不限</option>
              <option value="国央企">国企 / 央企</option>
              <option value="央企">央企</option>
              <option value="国企">国企</option>
              <option value="民企">民企</option>
              <option value="外企">外企</option>
              <option value="事业单位">事业单位</option>
            </select>
          </label>
          <label class="field">
            <span>行业</span>
            <select id="industry">
              <option value="">不限</option>
              <option value="互联网">互联网</option>
              <option value="能源">能源电力</option>
              <option value="汽车">汽车</option>
              <option value="金融">金融</option>
              <option value="半导体">半导体</option>
              <option value="通信">通信</option>
              <option value="游戏">游戏</option>
              <option value="航空航天">航空航天</option>
              <option value="教育">教育科研</option>
              <option value="制造">先进制造</option>
            </select>
          </label>
          <label class="field">
            <span>岗位方向</span>
            <select id="jobFamily">
              <option value="">不限</option>
              <option value="技术">技术 / 研发</option>
              <option value="产品">产品</option>
              <option value="运营">运营</option>
              <option value="市场">市场 / 营销</option>
              <option value="金融">金融</option>
              <option value="职能">职能</option>
              <option value="教育">教育</option>
              <option value="管培生">管培生</option>
            </select>
          </label>
          <label class="field">
            <span>专业</span>
            <input id="major" placeholder="计算机 / 电气" autocomplete="off" />
          </label>
          <label class="field">
            <span>最低来源</span>
            <select id="sourceLevel">
              <option value="">不限</option>
              <option value="B" selected>B 以上</option>
              <option value="A">A 以上</option>
              <option value="S">只看 S</option>
            </select>
          </label>
          <label class="field">
            <span>投递状态</span>
            <select id="trackerStatus">
              <option value="">不限</option>
              <option value="saved">已收藏</option>
              <option value="preparing">准备中</option>
              <option value="applied">已投递</option>
              <option value="assessment">测评 / 笔试</option>
              <option value="interview">面试</option>
              <option value="offer">Offer</option>
              <option value="rejected">未通过</option>
              <option value="withdrawn">已放弃</option>
            </select>
          </label>
          </div>

          <label class="check-row">
            <input id="includeExpired" type="checkbox" />
            <span>显示已截止项目</span>
          </label>
        </details>

        <button id="searchButton" class="primary-button" type="submit">搜索并刷新</button>
        <p id="searchStatus" class="search-status" role="status">准备就绪</p>
      </form>

      <details class="settings-section settings-details">
        <summary>联网与来源</summary>
        <label class="check-row network-toggle">
          <input id="onlineRefresh" type="checkbox" checked />
          <span>搜索时自动联网更新</span>
        </label>
        <div class="field-grid">
          <label class="field">
            <span>搜索通道</span>
            <select id="searchProvider">
              <option value="google">Google 招聘资讯</option>
              <option value="both">Google + Bing</option>
              <option value="all" selected>Google + Bing + 搜狗</option>
              <option value="bing">Bing</option>
              <option value="sogou">搜狗微信</option>
            </select>
          </label>
          <label class="field">
            <span>来源范围</span>
            <select id="sourceScope">
              <option value="all" selected>综合</option>
              <option value="official">企业官网</option>
              <option value="job_boards">招聘平台</option>
              <option value="university">高校就业网</option>
              <option value="wechat">公众号</option>
            </select>
          </label>
          <label class="field">
            <span>更新范围</span>
            <select id="freshnessDays">
              <option value="1">近 24 小时</option>
              <option value="7">近 7 天</option>
              <option value="30">近 30 天</option>
              <option value="90" selected>近 90 天</option>
              <option value="180">近 180 天</option>
              <option value="0">不限时间</option>
            </select>
          </label>
          <label class="field">
            <span>最多发现</span>
            <select id="maxResults">
              <option value="20">20 条</option>
              <option value="50">50 条</option>
              <option value="100" selected>100 条</option>
            </select>
          </label>
        </div>
        <div class="external-search-row">
          <button id="openGoogle" type="button" class="secondary-button">Google 查看</button>
          <button id="openBing" type="button" class="secondary-button">Bing 查看</button>
          <button id="openSogou" type="button" class="secondary-button">搜狗微信查看</button>
        </div>
      </details>

      <details class="settings-section settings-details">
        <summary>个人匹配设置</summary>
        <label class="field field-wide">
          <span>简历文本（仅本机处理）</span>
          <textarea id="resumeText" placeholder="粘贴简历内容，或选择 TXT / Markdown 文件"></textarea>
        </label>
        <label class="field field-wide compact-file-field">
          <span>读取简历文本文件</span>
          <input id="resumeFile" type="file" accept=".txt,.md,text/plain,text/markdown" />
        </label>
        <div class="field-grid profile-grid">
          <label class="field">
            <span>毕业年月</span>
            <input id="graduationDate" value="2027-06" placeholder="YYYY-MM" />
          </label>
          <label class="field">
            <span>学校地区</span>
            <select id="schoolRegion">
              <option value="domestic">国内</option>
              <option value="overseas" selected>海外</option>
              <option value="hmt">港澳台</option>
              <option value="unknown">未知</option>
            </select>
          </label>
          <label class="field">
            <span>学历</span>
            <select id="degree">
              <option value="associate">专科</option>
              <option value="bachelor">本科</option>
              <option value="master" selected>硕士</option>
              <option value="phd">博士</option>
            </select>
          </label>
          <label class="field">
            <span>笔试负担</span>
            <select id="maxWrittenBurden">
              <option value="">不限制</option>
              <option value="0">只看免笔试</option>
              <option value="1" selected>无统一笔试</option>
              <option value="2">接受测评</option>
              <option value="4">接受笔试</option>
            </select>
          </label>
        </div>
        <label class="field field-wide">
          <span>目标城市</span>
          <input id="targetCities" value="上海,北京" />
        </label>
        <label class="field field-wide">
          <span>目标岗位方向</span>
          <input id="targetJobFamilies" value="技术" placeholder="技术,产品,运营" />
        </label>
        <button id="runResumeMatch" type="button" class="primary-button full-width">按简历匹配全部机会</button>
        <button id="runMatch" type="button" class="text-action full-width">仅检查具体岗位资格</button>
      </details>

      <details class="settings-section settings-details">
        <summary>手动补充公告</summary>
        <label class="field field-wide"><span>公司</span><input id="importCompany" /></label>
        <label class="field field-wide"><span>岗位或项目</span><input id="importTitle" /></label>
        <label class="field field-wide"><span>公告链接</span><input id="importUrl" type="url" /></label>
        <label class="field field-wide"><span>公告正文</span><textarea id="importText"></textarea></label>
        <button id="importButton" type="button" class="secondary-button full-width">解析并加入</button>
        <p id="importStatus" class="search-status" role="status"></p>
      </details>
    </aside>

    <div id="splitter" class="splitter" role="separator" aria-label="调整左右宽度" aria-orientation="vertical" aria-valuemin="300" aria-valuemax="640" aria-valuenow="380" tabindex="0"></div>

    <section class="results-pane">
      <div class="results-topline">
        <div>
          <p class="section-kicker">CAMPUS OPPORTUNITIES</p>
          <h2>网申表格</h2>
          <p id="resultSummary" class="result-summary">正在读取...</p>
        </div>
        <div class="view-tabs" role="tablist" aria-label="结果视图">
          <button class="view-tab active" type="button" role="tab" aria-selected="true" data-view="opportunities">网申机会</button>
          <button class="view-tab" type="button" role="tab" aria-selected="false" data-view="tracker">投递进展</button>
          <button class="view-tab" type="button" role="tab" aria-selected="false" data-view="articles">公众号文章</button>
        </div>
      </div>

      <div class="table-action-bar">
        <div class="preset-bar" aria-label="快速视图">
          <button type="button" data-preset="latest">24h 最新</button>
          <button id="autumnPreset" type="button" data-preset="autumn">秋招</button>
          <button type="button" data-preset="soe">国企央企</button>
          <button type="button" data-preset="intern">实习</button>
          <button type="button" data-preset="all">全部</button>
        </div>
        <button id="exportCsv" type="button" class="secondary-button export-button">导出 CSV</button>
      </div>

      <section id="opportunitiesView" class="result-view active" role="tabpanel">
        <div class="table-wrap">
          <table class="opportunity-table">
            <colgroup>
              <col class="col-updated" />
              <col class="col-company" />
              <col class="col-title" />
              <col class="col-batch" />
              <col class="col-location" />
              <col class="col-deadline" />
              <col class="col-source" />
              <col class="col-progress" />
              <col class="col-actions" />
            </colgroup>
            <thead>
              <tr>
                <th scope="col" data-sort-column="updated_at"><button class="sort-button" type="button" data-sort="updated_at">更新</button></th>
                <th scope="col" data-sort-column="company_name"><button class="sort-button" type="button" data-sort="company_name">公司</button></th>
                <th scope="col" data-sort-column="title"><button class="sort-button" type="button" data-sort="title">岗位 / 招聘项目</button></th>
                <th scope="col" data-sort-column="recruitment_type"><button class="sort-button" type="button" data-sort="recruitment_type">批次</button></th>
                <th scope="col">地点</th>
                <th scope="col" data-sort-column="deadline"><button class="sort-button" type="button" data-sort="deadline">截止</button></th>
                <th scope="col" data-sort-column="source_level"><button class="sort-button" type="button" data-sort="source_level">来源</button></th>
                <th scope="col">进展</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="opportunityRows"></tbody>
          </table>
          <div id="emptyOpportunities" class="empty-state" hidden>
            <h3>暂无匹配机会</h3>
            <p>调整筛选后重新搜索，或开启联网更新。</p>
          </div>
        </div>
        <div class="table-footer" aria-label="分页">
          <span id="pagerSummary">第 1 页</span>
          <label class="page-size-control">每页
            <select id="pageSize">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
            </select>
          </label>
          <button id="previousPage" type="button" class="secondary-button">上一页</button>
          <button id="nextPage" type="button" class="secondary-button">下一页</button>
        </div>
      </section>

      <section id="articlesView" class="result-view" role="tabpanel" hidden>
        <div class="article-toolbar">
          <label class="field">
            <span>文章关键词</span>
            <input id="articleQuery" value="秋招" />
          </label>
          <label class="field">
            <span>新鲜度</span>
            <select id="articleFreshness">
              <option value="30">近 30 天</option>
              <option value="90" selected>近 90 天</option>
              <option value="0">不限时间</option>
            </select>
          </label>
          <button id="searchArticles" type="button" class="secondary-button">搜索文章</button>
        </div>
        <div id="articleRows" class="article-list"></div>
      </section>
    </section>
  </main>

  <dialog id="detailDialog">
    <div class="dialog-header">
      <h2>岗位证据</h2>
      <button id="closeDialog" type="button" class="text-button">关闭</button>
    </div>
    <div id="detailContent"></div>
  </dialog>

  <dialog id="trackerDialog">
    <div class="dialog-header">
      <div>
        <p class="section-kicker">APPLICATION TRACKER</p>
        <h2 id="trackerDialogTitle">投递记录</h2>
      </div>
      <button id="closeTrackerDialog" type="button" class="text-button">关闭</button>
    </div>
    <form id="trackerForm" class="tracker-form">
      <label class="field">
        <span>当前进展</span>
        <select id="trackerDialogStatus">
          <option value="saved">收藏</option>
          <option value="preparing">准备中</option>
          <option value="applied">已投递</option>
          <option value="assessment">测评 / 笔试</option>
          <option value="interview">面试</option>
          <option value="offer">Offer</option>
          <option value="rejected">未通过</option>
          <option value="withdrawn">已放弃</option>
        </select>
      </label>
      <label class="check-row tracker-favorite-row">
        <input id="trackerFavorite" type="checkbox" />
        <span>加入收藏</span>
      </label>
      <label class="field">
        <span>下一步日期</span>
        <input id="trackerNextAction" type="date" />
      </label>
      <label class="field">
        <span>备注</span>
        <textarea id="trackerNote" placeholder="联系人、测评时间、面试安排或待办事项"></textarea>
      </label>
      <div class="dialog-actions">
        <button id="deleteTracker" type="button" class="danger-button">删除记录</button>
        <button type="submit" class="primary-button">保存进展</button>
      </div>
      <p id="trackerDialogStatusText" class="search-status" role="status"></p>
    </form>
  </dialog>

  <script src="/assets/app.js"></script>
</body>
</html>
